<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promociones — Encantos Eternos</title>
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="../../css/admin.css" />
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <main class="admin-main">
    <div class="topbar" id="topbar"></div>
    <div class="admin-content">

      <!-- Promociones -->
      <div class="page-header">
        <div><h2>Promociones</h2><p>Las promociones activas se muestran en la página de clientes</p></div>
        <button class="btn btn-primary" onclick="Modal.open('modal-promo')">+ Nueva promoción</button>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;margin-bottom:2.5rem" id="cards-promos">
        <div style="text-align:center;padding:2rem;color:var(--gris-400)">Cargando...</div>
      </div>

      <!-- Eventos -->
      <div class="page-header" style="margin-top:1rem">
        <div><h2>Eventos especiales</h2><p>Fechas como San Valentín, Día de la Madre, etc.</p></div>
        <button class="btn btn-primary" onclick="Modal.open('modal-evento')">+ Nuevo evento</button>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem" id="cards-eventos">
        <div style="text-align:center;padding:2rem;color:var(--gris-400)">Cargando...</div>
      </div>

    </div>
  </main>
</div>

<!-- Modal promoción -->
<div class="modal-overlay" id="modal-promo">
  <div class="modal">
    <div class="modal-header"><h3>Nueva promoción</h3><button class="btn-close" onclick="Modal.close('modal-promo')">×</button></div>
    <div class="modal-body">
      <div class="form-stack">
        <div class="form-group"><label class="form-label">Título <span class="req">*</span></label><input class="form-control" id="promo-titulo" placeholder="Ej: 2x1 en ramos de rosas" required /></div>
        <div class="form-group"><label class="form-label">Descripción</label><textarea class="form-control" id="promo-desc" rows="2" placeholder="Detalles de la promoción..."></textarea></div>
        <div class="form-grid-2">
          <div class="form-group"><label class="form-label">Descuento (%)</label><input class="form-control" type="number" id="promo-descuento" min="0" max="100" placeholder="Ej: 20" /></div>
          <div class="form-group"><label class="form-label">Tipo</label><select class="form-control" id="promo-tipo"><option value="porcentaje">Porcentaje</option><option value="2x1">2x1</option><option value="precio_fijo">Precio fijo</option><option value="regalo">Con regalo</option></select></div>
        </div>
        <div class="form-grid-2">
          <div class="form-group"><label class="form-label">Válida desde</label><input class="form-control" type="date" id="promo-desde" /></div>
          <div class="form-group"><label class="form-label">Válida hasta</label><input class="form-control" type="date" id="promo-hasta" /></div>
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">
            <input type="checkbox" id="promo-activa" checked /> Mostrar en el sitio de clientes
          </label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="Modal.close('modal-promo')">Cancelar</button>
      <button class="btn btn-primary btn-sm" onclick="guardarPromo()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal evento -->
<div class="modal-overlay" id="modal-evento">
  <div class="modal">
    <div class="modal-header"><h3>Nuevo evento</h3><button class="btn-close" onclick="Modal.close('modal-evento')">×</button></div>
    <div class="modal-body">
      <div class="form-stack">
        <div class="form-group"><label class="form-label">Nombre del evento <span class="req">*</span></label><input class="form-control" id="ev-nombre" placeholder="Ej: San Valentín 2026" required /></div>
        <div class="form-group"><label class="form-label">Descripción</label><textarea class="form-control" id="ev-desc" rows="2" placeholder="¿Qué ofreces en esta fecha especial?"></textarea></div>
        <div class="form-group"><label class="form-label">Emoji / ícono</label><input class="form-control" id="ev-emoji" placeholder="Ej: 💕" maxlength="4" /></div>
        <div class="form-grid-2">
          <div class="form-group"><label class="form-label">Fecha del evento</label><input class="form-control" type="date" id="ev-fecha" /></div>
          <div class="form-group"><label class="form-label">Color del banner</label><select class="form-control" id="ev-color"><option value="rosa">Rosa</option><option value="dorado">Dorado</option><option value="rojo">Rojo</option><option value="morado">Morado</option></select></div>
        </div>
        <div class="form-group"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px"><input type="checkbox" id="ev-activo" checked /> Mostrar en el sitio</label></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="Modal.close('modal-evento')">Cancelar</button>
      <button class="btn btn-primary btn-sm" onclick="guardarEvento()">Guardar</button>
    </div>
  </div>
</div>

<script src="../../js/main.js"></script>
<script src="../../js/admin-layout.js"></script>
<script>
  initAdminLayout('promociones', 'Promociones y eventos', 'Contenido');
  let promos = [], eventos = [];

  async function cargarPromos() {
    try {
      const response = await API.get('/promociones');
      // Backend: { success: true, data: [...] }
      promos = response.data || response.promociones || response || [];
    } catch(e) {
      console.error('Error cargando promociones:', e);
      Toast.error('No se pudieron cargar las promociones');
      promos = [];
    }
    renderPromos();
  }

  async function cargarEventos() {
    try {
      const response = await API.get('/eventos');
      // Backend: { success: true, data: [...] }
      eventos = response.data || response.eventos || response || [];
    } catch(e) {
      console.error('Error cargando eventos:', e);
      Toast.error('No se pudieron cargar los eventos');
      eventos = [];
    }
    renderEventos();
  }

  const COLOR_BG = { rosa:'var(--rosa-50)', dorado:'var(--dorado-50)', rojo:'#FFF0F0', morado:'#F5F0FF' };
  const COLOR_BORDE = { rosa:'var(--rosa-400)', dorado:'var(--dorado-400)', rojo:'#FF6B6B', morado:'#9B6BFF' };

  function renderPromos() {
    const el = document.getElementById('cards-promos');
    if (!promos.length) { el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--gris-400)">Sin promociones</div>'; return; }
    el.innerHTML = promos.map(p => `
      <div style="background:var(--blanco);border:1px solid var(--rosa-100);border-left:4px solid ${p.activa?'var(--rosa-400)':'var(--gris-300)'};border-radius:var(--radius-lg);padding:1.25rem">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <span class="badge ${p.activa?'badge-success':'badge-gray'}">${p.activa?'Activa':'Inactiva'}</span>
          <button class="btn-tbl btn-tbl-delete" onclick="eliminarPromo(${p.id})">Eliminar</button>
        </div>
        <div style="font-family:var(--font-display);font-size:17px;margin-bottom:4px">${p.titulo}</div>
        <div style="font-size:12px;color:var(--gris-500);margin-bottom:8px">${p.descripcion||''}</div>
        ${p.descuento ? `<div style="font-size:24px;font-weight:700;color:var(--rosa-600);font-family:var(--font-display)">${p.descuento}% OFF</div>` : ''}
        <div style="font-size:11px;color:var(--gris-400);margin-top:4px">Vigente: ${p.fecha_desde ? Fmt.fecha(p.fecha_desde) : '—'} al ${p.fecha_hasta ? Fmt.fecha(p.fecha_hasta) : '—'}</div>
      </div>`).join('');
  }

  function renderEventos() {
    const el = document.getElementById('cards-eventos');
    if (!eventos.length) { el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--gris-400)">Sin eventos</div>'; return; }
    el.innerHTML = eventos.map(e => `
      <div style="background:${COLOR_BG[e.color]||'var(--rosa-50)'};border:1px solid;border-color:${e.activo?COLOR_BORDE[e.color]:'var(--gris-200)'};border-radius:var(--radius-lg);padding:1.25rem">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <span class="badge ${e.activo?'badge-success':'badge-gray'}">${e.activo?'Activo':'Inactivo'}</span>
          <button class="btn-tbl btn-tbl-delete" onclick="eliminarEvento(${e.id})">Eliminar</button>
        </div>
        <div style="font-size:32px;margin-bottom:6px">${e.emoji||'🌸'}</div>
        <div style="font-family:var(--font-display);font-size:18px;margin-bottom:4px">${e.nombre}</div>
        <div style="font-size:12px;color:var(--gris-500);margin-bottom:8px">${e.descripcion||''}</div>
        ${e.fecha ? `<div style="font-size:11px;color:var(--gris-500)">📅 ${Fmt.fecha(e.fecha)}</div>` : ''}
      </div>`).join('');
  }

  async function guardarPromo() {
    const payload = {
      titulo:       document.getElementById('promo-titulo').value.trim(),
      descripcion:  document.getElementById('promo-desc').value.trim(),
      descuento:    parseInt(document.getElementById('promo-descuento').value) || 0,
      tipo:         document.getElementById('promo-tipo').value,
      fecha_desde:  document.getElementById('promo-desde').value || null,
      fecha_hasta:  document.getElementById('promo-hasta').value || null,
      activa:       document.getElementById('promo-activa').checked
    };
    if (!payload.titulo) { Toast.warning('El título es obligatorio'); return; }
    try {
      await API.post('/promociones', payload);
      Toast.success('Promoción creada');
      Modal.close('modal-promo');
      // Limpiar formulario
      document.getElementById('promo-titulo').value = '';
      document.getElementById('promo-desc').value = '';
      document.getElementById('promo-descuento').value = '';
      document.getElementById('promo-desde').value = '';
      document.getElementById('promo-hasta').value = '';
      document.getElementById('promo-activa').checked = true;
      await cargarPromos();
    } catch(e) {
      Toast.error(e.message || 'Error al crear la promoción');
    }
  }

  async function guardarEvento() {
    const payload = {
      nombre:      document.getElementById('ev-nombre').value.trim(),
      descripcion: document.getElementById('ev-desc').value.trim(),
      emoji:       document.getElementById('ev-emoji').value || '🌸',
      fecha:       document.getElementById('ev-fecha').value || null,
      color:       document.getElementById('ev-color').value,
      activo:      document.getElementById('ev-activo').checked
    };
    if (!payload.nombre) { Toast.warning('El nombre es obligatorio'); return; }
    try {
      await API.post('/eventos', payload);
      Toast.success('Evento creado');
      Modal.close('modal-evento');
      // Limpiar formulario
      document.getElementById('ev-nombre').value = '';
      document.getElementById('ev-desc').value = '';
      document.getElementById('ev-emoji').value = '';
      document.getElementById('ev-fecha').value = '';
      document.getElementById('ev-activo').checked = true;
      await cargarEventos();
    } catch(e) {
      Toast.error(e.message || 'Error al crear el evento');
    }
  }

  function eliminarPromo(id) {
    Modal.confirm('¿Eliminar esta promoción?', async () => {
      try {
        await API.delete('/promociones/' + id);
        Toast.success('Promoción eliminada');
        await cargarPromos();
      } catch(e) {
        Toast.error(e.message || 'Error al eliminar');
      }
    });
  }

  function eliminarEvento(id) {
    Modal.confirm('¿Eliminar este evento?', async () => {
      try {
        await API.delete('/eventos/' + id);
        Toast.success('Evento eliminado');
        await cargarEventos();
      } catch(e) {
        Toast.error(e.message || 'Error al eliminar');
      }
    });
  }

  cargarPromos();
  cargarEventos();
</script>
</body>
</html>
