<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trabajadores — Encantos Eternos</title>
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="../../css/admin.css" />
   <link rel="icon" type="image/png" href="../../icon/favicon.png">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <main class="admin-main">
    <div class="topbar" id="topbar"></div>
    <div class="admin-content">
      <div class="page-header">
        <div><h2>Trabajadores</h2><p>Gestiona el equipo de la florería</p></div>
        <button class="btn btn-primary" onclick="Modal.open('modal-trab')">+ Nuevo trabajador</button>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem" id="cards-trab">
        <div style="text-align:center;padding:2rem;color:var(--gris-400);font-size:13px">Cargando...</div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-trab">
  <div class="modal">
    <div class="modal-header"><h3 id="titulo-modal-trab">Nuevo trabajador</h3><button class="btn-close" onclick="Modal.close('modal-trab')">×</button></div>
    <div class="modal-body">
      <div class="form-stack">
        <div class="form-group"><label class="form-label">Nombre completo <span class="req">*</span></label><input class="form-control" id="trab-nombre" required /></div>
        <div class="form-group"><label class="form-label">Teléfono</label><input class="form-control" id="trab-telefono" type="tel" /></div>
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">Cargo <span class="req">*</span></label>
            <select class="form-control" id="trab-cargo">
              <option>Vendedor/a</option><option>Florista</option><option>Delivery</option><option>Administrador/a</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">Fecha de ingreso</label><input class="form-control" type="date" id="trab-ingreso" /></div>
        </div>
        <div class="form-group"><label class="form-label">Correo electrónico</label><input class="form-control" type="email" id="trab-email" /></div>
        <div class="form-group">
          <label class="form-label">Contraseña del sistema</label>
          <input class="form-control" type="password" id="trab-pass" placeholder="Mínimo 6 caracteres" />
        </div>
        <div class="form-group">
          <label class="form-label">Rol en el sistema</label>
          <select class="form-control" id="trab-rol">
            <option value="empleado">Empleado</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="Modal.close('modal-trab')">Cancelar</button>
      <button class="btn btn-primary btn-sm" onclick="guardarTrabajador()">Guardar</button>
    </div>
  </div>
</div>

<script src="../../js/main.js"></script>
<script src="../../js/admin-layout.js"></script>
<script>
  initAdminLayout('trabajadores', 'Trabajadores', 'Negocio');
  let trabajadores = [];

  async function cargarTrabajadores() {
    try {
      const response = await API.get('/trabajadores');
      const data = response.data || response;
      trabajadores = data.data || data.trabajadores || data || [];
      console.log('Trabajadores cargados:', trabajadores.length);
    } catch (error) {
      console.error('Error al cargar trabajadores:', error);
      Toast.error('No se pudieron cargar los trabajadores');
      trabajadores = [];
    }
    renderCards();
  }

  function renderCards() {
    const el = document.getElementById('cards-trab');
    if (!trabajadores.length) { el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--gris-400)">No hay trabajadores registrados</div>'; return; }
    const CARGO_COLOR = { 'Vendedora':'badge-rosa','Vendedor/a':'badge-rosa', Florista:'badge-dorado', Delivery:'badge-info', 'Administrador/a':'badge-success' };
    const ROL_COLOR = { admin:'badge-success', empleado:'badge-info', duena:'badge-rosa' };
    const ROL_LABEL = { admin:'Administrador', empleado:'Empleado', duena:'Dueña' };
    
    el.innerHTML = trabajadores.filter(t => t.activo !== false).map(t => {
      const initials = t.nombre.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      const fechaIngreso = t.fecha_ingreso || t.ingreso;
      return `
        <div class="card" style="padding:1.25rem">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem">
            <div class="avatar" style="width:44px;height:44px;font-size:15px">${initials}</div>
            <div style="flex:1">
              <div style="font-weight:600;font-size:14px">${t.nombre}</div>
              <span class="badge ${CARGO_COLOR[t.cargo]||'badge-gray'}">${t.cargo}</span>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--gris-600);margin-bottom:1rem">
            ${t.email ? `<div>✉️ ${t.email}</div>` : ''}
            ${t.telefono ? `<div>📱 ${Fmt.tel(t.telefono)}</div>` : ''}
            ${fechaIngreso ? `<div>📅 Desde ${Fmt.fecha(fechaIngreso)}</div>` : ''}
            <div>🔑 Rol: <span class="badge ${ROL_COLOR[t.rol]||'badge-gray'}">${ROL_LABEL[t.rol]||t.rol}</span></div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-outline btn-sm" style="flex:1;color:var(--danger);border-color:var(--danger)" onclick="eliminarTrabajador(${t.id},'${t.nombre.replace(/'/g,"\\'")}')">Desactivar</button>
          </div>
        </div>`;
    }).join('');
  }

  async function guardarTrabajador() {
    const payload = {
      nombre:        document.getElementById('trab-nombre').value.trim(),
      telefono:      document.getElementById('trab-telefono').value.trim(),
      cargo:         document.getElementById('trab-cargo').value,
      fecha_ingreso: document.getElementById('trab-ingreso').value,
      email:         document.getElementById('trab-email').value.trim(),
      password:      document.getElementById('trab-pass').value,
      rol:           document.getElementById('trab-rol').value,
    };
    
    // Validaciones
    if (!payload.nombre) {
      Toast.warning('El nombre es obligatorio');
      return;
    }
    if (!payload.email) {
      Toast.warning('El correo electrónico es obligatorio');
      return;
    }
    if (!payload.password || payload.password.length < 6) {
      Toast.warning('La contraseña debe tener al menos 6 caracteres');
      return;
    }
    
    try {
      await API.post('/trabajadores', payload);
      Toast.success('Trabajador registrado correctamente');
      Modal.close('modal-trab');
      
      // Limpiar formulario
      document.getElementById('trab-nombre').value = '';
      document.getElementById('trab-telefono').value = '';
      document.getElementById('trab-email').value = '';
      document.getElementById('trab-pass').value = '';
      document.getElementById('trab-ingreso').value = '';
      
      await cargarTrabajadores(); // Recargar desde el backend
    } catch (error) {
      console.error('Error al guardar trabajador:', error);
      Toast.error(error.message || 'Error al guardar el trabajador');
    }
  }

  async function eliminarTrabajador(id, nombre) {
    Modal.confirm(`¿Desactivar al trabajador "${nombre}"? No podrá acceder al sistema.`, async () => {
      try {
        await API.delete('/trabajadores/' + id);
        Toast.success('Trabajador desactivado correctamente');
        await cargarTrabajadores(); // Recargar desde el backend
      } catch (error) {
        console.error('Error al eliminar trabajador:', error);
        Toast.error(error.message || 'Error al desactivar el trabajador');
      }
    });
  }

  cargarTrabajadores();
</script>
</body>
</html>
